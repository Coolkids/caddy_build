name: Build Coolkid Caddy Image
on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'
jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Docker Image
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Release version
        id: release_version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(gh release view \
            --repo caddyserver/caddy \
            --json tagName \
            -q .tagName)

          if [ -z "$VERSION" ]; then
            echo "::error::Failed to get latest release version"
            exit 1
          fi

          VERSION=${VERSION#v}

          echo "app_version=$VERSION" >> $GITHUB_ENV

      - name: Get Docker Hub Latest Version
        id: docker_version
        run: |
          IMAGE="${{ secrets.DOCKER_USERNAME }}/caddy"

          TAG=$(curl -fsSL \
            "https://hub.docker.com/v2/repositories/${IMAGE}/tags?page_size=100" \
            | jq -r '.results[].name' \
            | grep -Ev '^(latest)$' \
            | sort -V \
            | tail -n 1)

          if [ -z "$TAG" ]; then
            echo "::error::Failed to get Docker Hub version"
            exit 1
          fi

          echo "docker_version=$TAG" >> $GITHUB_ENV

      - name: Compare Versions
        id: compare
        run: |
          APP="${{ env.app_version }}"
          DOCKER="${{ env.docker_version }}"

          if [ -z "$APP" ] || [ "$APP" = "null" ]; then
            echo "::error::Invalid app version"
            exit 1
          fi

          if [ -z "$DOCKER" ] || [ "$DOCKER" = "null" ]; then
            echo "::warning::Docker version unavailable"
            echo "should_build=false" >> $GITHUB_ENV
            exit 0
          fi

          if [ "$APP" = "$DOCKER" ]; then
            echo "should_build=false" >> $GITHUB_ENV
          else
            echo "should_build=true" >> $GITHUB_ENV
          fi
          
      - name: Set Up QEMU
        if: env.should_build == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set Up Buildx
        if: env.should_build == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Login DockerHub
        if: env.should_build == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        if: env.should_build == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: |
            linux/amd64
            linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/caddy:latest
            ${{ secrets.DOCKER_USERNAME }}/caddy:${{ env.app_version }}
